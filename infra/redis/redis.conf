# Redis 설정 파일

# 메모리 정책
maxmemory 256mb
maxmemory-policy allkeys-lru

# 백그라운드 저장 설정
save 900 1
save 300 10
save 60 10000

# 로그 레벨
loglevel notice

# 데이터 디렉토리
dir /data

# AOF (Append Only File) 활성화
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 비밀번호 (프로덕션에서는 반드시 설정)
# requirepass your-strong-password

# 타임아웃 (초)
timeout 300

# TCP 백로그
tcp-backlog 511

# 최대 클라이언트 연결 수
# maxclients 10000
